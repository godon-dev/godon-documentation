site_name: 'godon'
site_description: 'Open Source Optimization Engine for Live Systems — Parallelized Metaheuristics driven Infrastructure and Platform Tuning'
site_author: 'Matthias Tafelmeier'
site_url: https://godon-dev.github.io/godon-documentation
repo_url: https://github.com/godon-dev/godon
repo_name: GitHub
copyright: "Copyright &copy; 2019 - Today; Matthias Tafelmeier"
extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/JZHSBpVr
      name: Discord
theme:
  name: "material"
  features:
    - navigation.footer
    - navigation.tabs
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
  favicon: assets/icon.png
  logo: assets/logo_small.png
  icon:
    repo: fontawesome/brands/github
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
plugins:
  - social
nav:
     - Landing: index.md
     - Purpose: purpose.md
     - Documentation:
          - Setup: setup.md
          - Architecture: architecture.md
          - Core Concepts:
            - Breeder: concept_breeder.md
            - Effectuator: concept_effectuator.md
            - Reconnaissance: concept_reconnaissance.md
            - Guardrails: concept_guardrails.md
          - Configuration_Guide: config_guide.md
          - Comparison: comparison.md
          - MCP_Interface: mcp.md
          - References: references.md
     - OpenAPI: api.md
