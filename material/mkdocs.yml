site_name: 'godon'
site_description: 'Project around Paralellized Metaheuristics driven Infrastructure Optimization'
site_author: 'Matthias Tafelmeier'
repo_url: https://github.com/godon-dev/godon
repo_name: GitHub
copyright: "Copyright &copy; 2019 - Today; Matthias Tafelmeier"
theme:
  name: "material"
  features:
    - navigation.footer
    - navigation.tabs
  palette:
    # Dark mode palette
    - scheme: slate
      primary: teal
      accent: cyan
  favicon: assets/icon.png
  logo: assets/logo_small.png
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
nav:
     - Landing: index.md
     - Purpose: purpose.md
     - Documentation:
         - Setup: setup.md
         - Architecture: architecture.md
         - Core Concepts:
           - Breeder: concept_breeder.md
           - Effectuator: concept_effectuator.md
           - Reconnaissance: concept_reconnaissance.md
           - Guardrails: concept_guardrails.md
         - Configuration_Guide: config_guide.md
         - Comparison: comparison.md
         - References: references.md
     - OpenAPI: api.md
