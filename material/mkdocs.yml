site_name: 'godon'
site_description: 'Open Source Live Systems Tending and Causal Discernment Engine'
site_author: 'Matthias Tafelmeier'
site_url: https://godon-dev.github.io/godon-documentation
repo_url: https://github.com/godon-dev/godon
repo_name: GitHub
copyright: "Copyright &copy; 2019 - Today; Matthias Tafelmeier"
extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/4N7jF7s3yv
      name: Discord
theme:
  name: "material"
  features:
    - navigation.footer
    - navigation.tabs
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
  favicon: assets/icon.png
  logo: assets/logo_small.png
  icon:
    repo: fontawesome/brands/github
  custom_dir: overrides
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.superfences
  - meta
plugins:
  - social
  - tags:
      tags_file: blog/index.md
  - blog:
      blog_dir: blog
      post_dir: blog/posts
      post_excerpt: required
      archive: true
      archive_name: Archive
      categories: false

nav:
     - Landing: index.md
     - Purpose: purpose.md
     - Documentation:
          - Getting Started: getting_started.md
          - Setup: setup.md
          - Architecture: architecture.md
          - Core Concepts:
            - Breeder: concept_breeder.md
            - Effectuator: concept_effectuator.md
            - Reconnaissance: concept_reconnaissance.md
            - Guardrails: concept_guardrails.md
            - Interference Detection: concept_interference_detection.md
          - Development:
            - Bench_Scenarios: bench_scenarios.md
            - Detection_Capabilities: detection_capabilities.md
            - Open_Research: open_research.md
          - Configuration_Guide: config_guide.md
          - Comparison: comparison.md
          - MCP_Interface: mcp.md
          - References: references.md
          - Contributing: contributing.md
     - OpenAPI: api.md
     - Blog:
          - Overview: blog/index.md
