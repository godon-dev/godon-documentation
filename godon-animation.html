<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godon — Mechanism Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
  }
  canvas { display: block; }
  #replay {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    z-index: 10;
    transition: all 0.3s ease;
  }
  #replay:hover {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<button id="replay">↻ Replay</button>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const replayBtn = document.getElementById('replay');

let W, H, CX, CY;
function resize() {
  const size = Math.min(window.innerWidth, window.innerHeight, 900);
  canvas.width = size;
  canvas.height = size;
  W = canvas.width;
  H = canvas.height;
  CX = W / 2;
  CY = H / 2;
}
resize();
window.addEventListener('resize', () => { resize(); buildNodes(); });

const ease = {
  inOutCubic: t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2,
  outCubic: t => 1 - Math.pow(1 - t, 3),
  outBack: t => { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); },
  inOutQuad: t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2,
};

// === THREE LAYERS — stacked system ===
const LAYER_Y = [0.18, 0.42, 0.66, 0.88]; // 4 layers — deep stack
const LAYER_NAMES = ['edge', 'application', 'services', 'infrastructure'];
const NODES_PER_LAYER = [3, 4, 4, 3];

let nodes = [];
let docEdges = [];

function buildNodes() {
  nodes = [];
  docEdges = [];
  const spread = W * 0.65;
  const startX = CX - spread / 2;

  for (let li = 0; li < LAYER_Y.length; li++) {
    const count = NODES_PER_LAYER[li];
    const spacing = spread / Math.max(1, count - 1);
    for (let ni = 0; ni < count; ni++) {
      const x = count === 1 ? CX : startX + spacing * ni;
      nodes.push({
        id: nodes.length,
        layer: li,
        baseX: x + (Math.random() - 0.5) * 8,
        baseY: H * LAYER_Y[li],
        phase: Math.random() * Math.PI * 2,
        freq: 0.8 + Math.random() * 0.6,
        jitterPhase: Math.random() * Math.PI * 2,
        jitterFreq: 1.5 + Math.random() * 2.0,
        jitterAmp: 4 + Math.random() * 6,
        size: 5 + Math.random() * 3,
      });
    }
  }

  // Documented edges — within layers + some cross-layer
  for (let li = 0; li < LAYER_Y.length; li++) {
    const layerNodes = nodes.filter(n => n.layer === li);
    for (let i = 0; i < layerNodes.length - 1; i++) {
      docEdges.push({ a: layerNodes[i].id, b: layerNodes[i + 1].id, type: 'layer' });
    }
  }
  // Expected cross-layer connections
  docEdges.push({ a: 3, b: 7, type: 'cross' }); // app -> services
  docEdges.push({ a: 6, b: 11, type: 'cross' }); // services -> infra
  docEdges.push({ a: 1, b: 4, type: 'cross' });  // edge -> app
}
buildNodes();

function nodePos(node, time, chaos) {
  const jx = Math.sin(time * node.jitterFreq + node.jitterPhase) * node.jitterAmp * chaos;
  const jy = Math.cos(time * node.jitterFreq * 1.3 + node.jitterPhase) * node.jitterAmp * 0.5 * chaos;
  return { x: node.baseX + jx, y: node.baseY + jy };
}

// === HIDDEN COUPLING EDGES — cross layers unexpectedly ===
const hiddenEdges = [
  { from: 0, to: 7, revealAt: 5.5 },   // edge -> services (deep)
  { from: 5, to: 11, revealAt: 7.0 },   // app -> infra (deep)
  { from: 2, to: 9, revealAt: 8.0 },    // edge -> infra (deepest)
];

// === BREEDERS on specific nodes ===
const breederNodes = [0, 5, 11];

// === TIMING — 14 seconds ===
const PHASES = {
  chaos:     { start: 0,    end: 3.5 },
  probe:     { start: 3.5,  end: 4.0 },
  perturb1:  { start: 4.0,  end: 6.0 },
  perturb2:  { start: 6.0,  end: 8.5 },
  tend:      { start: 8.5,  end: 12.0 },
  hold:      { start: 12.0, end: 14.5 },
};
const TOTAL = 14.5;

// === STATE ===
let startTime = null;
let lastTime = 0;
let perturb1Spawned = false;
let perturb2Spawned = false;
let perturbations = [];

function getElapsed(now) {
  if (!startTime) startTime = now;
  return (now - startTime) / 1000;
}
function inPhase(e, p) { return e >= p.start && e < p.end; }
function pp(e, p) { return Math.max(0, Math.min(1, (e - p.start) / (p.end - p.start))); }

// === PERTURBATION ===
function spawnPerturbation(fromId, toId) {
  perturbations.push({ fromId, toId, progress: 0, speed: 0.3, amp: 12 });
}
function updatePerturbations(dt) {
  for (let i = perturbations.length - 1; i >= 0; i--) {
    perturbations[i].progress += perturbations[i].speed * dt;
    if (perturbations[i].progress > 1.2) perturbations.splice(i, 1);
  }
}

// === DRAW ===
function drawBackground() {
  ctx.fillStyle = '#08080f';
  ctx.fillRect(0, 0, W, H);

  // Layer bands
  for (let i = 0; i < LAYER_Y.length; i++) {
    const y = H * LAYER_Y[i];
    const g = ctx.createLinearGradient(0, y - 30, 0, y + 30);
    g.addColorStop(0, 'rgba(20, 25, 45, 0)');
    g.addColorStop(0.5, `rgba(30, 38, 58, ${0.08})`);
    g.addColorStop(1, 'rgba(20, 25, 45, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(W * 0.05, y - 30, W * 0.9, 60);
  }

  // Layer labels
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.font = '10px -apple-system, Helvetica, sans-serif';
  for (let i = 0; i < LAYER_NAMES.length; i++) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
    ctx.fillText(LAYER_NAMES[i], W * 0.06, H * LAYER_Y[i] - 22);
  }
}

function drawDocEdges(time, chaos, elapsed) {
  for (const e of docEdges) {
    const pa = nodePos(nodes[e.a], time, chaos);
    const pb = nodePos(nodes[e.b], time, chaos);

    // Much more visible than before
    const alpha = e.type === 'cross' ? 0.15 : 0.12;
    ctx.strokeStyle = `rgba(120, 150, 200, ${alpha + chaos * 0.05})`;
    ctx.lineWidth = e.type === 'cross' ? 1.2 : 0.8;
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
  }
}

function drawHiddenEdges(time, chaos, elapsed) {
  for (const edge of hiddenEdges) {
    if (elapsed < edge.revealAt) continue;
    const p = Math.min(1, (elapsed - edge.revealAt) / 1.2);
    const alpha = ease.outBack(Math.min(1, p * 1.3));
    const na = nodes[edge.from], nb = nodes[edge.to];
    const pa = nodePos(na, time, chaos);
    const pb = nodePos(nb, time, chaos);

    // Thick glow
    ctx.strokeStyle = `rgba(255, 90, 74, ${alpha * 0.15})`;
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();

    // Medium glow
    ctx.strokeStyle = `rgba(255, 90, 74, ${alpha * 0.3})`;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();

    // Core line — bright, solid
    ctx.strokeStyle = `rgba(255, 120, 80, ${alpha * 0.95})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();

    // Energy pulse traveling along the edge
    const pulseT = ((elapsed * 0.35) + edge.from * 0.15) % 1;
    const px = pa.x + (pb.x - pa.x) * pulseT;
    const py = pa.y + (pb.y - pa.y) * pulseT;
    const pulseGlow = ctx.createRadialGradient(px, py, 0, px, py, 8);
    pulseGlow.addColorStop(0, `rgba(255, 180, 120, ${alpha * 0.8})`);
    pulseGlow.addColorStop(1, 'rgba(255, 100, 60, 0)');
    ctx.fillStyle = pulseGlow;
    ctx.beginPath();
    ctx.arc(px, py, 8, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPerturbations(time, chaos) {
  for (const p of perturbations) {
    if (p.progress < 0 || p.progress > 1) continue;
    const na = nodes[p.fromId], nb = nodes[p.toId];
    const pa = nodePos(na, time, chaos);
    const pb = nodePos(nb, time, chaos);
    const dx = pb.x - pa.x, dy = pb.y - pa.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 1) continue;
    const nx = -dy / len, ny = dx / len;

    const trailLen = 0.35;
    const startT = Math.max(0, p.progress - trailLen);
    const endT = Math.min(1, p.progress);
    const dist = Math.max(0.1, p.progress); // distortion grows with distance
    const baseAlpha = Math.max(0.3, 1 - dist * 0.5);

    // Draw wiggle — sinusoidal wave perpendicular to edge
    const segments = 60;
    ctx.strokeStyle = `rgba(255, 235, 74, ${baseAlpha * 0.8})`;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();

    for (let s = 0; s <= segments; s++) {
      const t = startT + (endT - startT) * (s / segments);
      const px2 = pa.x + dx * t;
      const py2 = pa.y + dy * t;

      const trailCenter = (startT + endT) / 2;
      const falloff = Math.max(0, 1 - Math.abs(t - trailCenter) / (trailLen / 2));
      const wiggle = p.amp * Math.sin(t * 45 - time * 0.012) * falloff;

      const wx = px2 + nx * wiggle;
      const wy = py2 + ny * wiggle;
      if (s === 0) ctx.moveTo(wx, wy);
      else ctx.lineTo(wx, wy);
    }
    ctx.stroke();

    // Bright wavefront
    const hx = pa.x + dx * p.progress;
    const hy = pa.y + dy * p.progress;
    const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, 16);
    hg.addColorStop(0, `rgba(255, 235, 74, ${baseAlpha * 0.6})`);
    hg.addColorStop(1, 'rgba(255, 200, 50, 0)');
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.arc(hx, hy, 16, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(255, 240, 100, ${baseAlpha})`;
    ctx.beginPath();
    ctx.arc(hx, hy, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawNodes(time, chaos, elapsed) {
  for (const node of nodes) {
    const pos = nodePos(node, time, chaos);
    const pulse = 0.6 + Math.sin(time * node.freq + node.phase) * 0.25;

    // Color shift during tend
    let r = 80, g = 140, b = 220;
    if (elapsed > PHASES.tend.start) {
      const tp = pp(elapsed, PHASES.tend);
      const t = ease.inOutCubic(tp);
      r = 80 + (74 - 80) * t;
      g = 140 + (232 - 140) * t;
      b = 220 + (160 - 220) * t;
    }

    // Glow
    const glowR = node.size + 10;
    const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowR);
    grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${0.3 * pulse})`);
    grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Node body
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.12)`;
    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.8 * pulse})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, node.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Core
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.9 * pulse})`;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBreeders(time, chaos, elapsed) {
  const probing = (inPhase(elapsed, PHASES.probe) || inPhase(elapsed, PHASES.perturb1) || inPhase(elapsed, PHASES.perturb2));

  for (let i = 0; i < breederNodes.length; i++) {
    const node = nodes[breederNodes[i]];
    const pos = nodePos(node, time, chaos);

    let r, g, b, scale, glowOp;

    if (probing && i === 0) {
      r = 255; g = 235; b = 74;
      scale = 1.5;
      glowOp = 0.5 + Math.sin(time * 0.012) * 0.2;
    } else if (probing) {
      r = 60; g = 60; b = 70;
      scale = 0.7;
      glowOp = 0.05;
    } else if (elapsed > PHASES.tend.start) {
      const tp = pp(elapsed, PHASES.tend);
      const t = ease.inOutCubic(tp);
      r = 126 + (74 - 126) * t;
      g = 184 + (232 - 184) * t;
      b = 255 + (160 - 255) * t;
      scale = 1.0;
      glowOp = 0.25;
    } else {
      r = 126; g = 184; b = 255;
      scale = 1.0;
      glowOp = 0.2 + Math.sin(time * 0.004 + i) * 0.1;
    }

    // Glow
    const glowR = 18 * scale;
    const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowR);
    grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${glowOp})`);
    grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Diamond
    const s = 6 * scale;
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.9)`;
    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 1)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y - s);
    ctx.lineTo(pos.x + s, pos.y);
    ctx.lineTo(pos.x, pos.y + s);
    ctx.lineTo(pos.x - s, pos.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

function drawText(elapsed) {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '12px -apple-system, Helvetica, sans-serif';

  if (elapsed < PHASES.probe.start) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.fillText('live system — agents on shared substrate', CX, H * 0.97);
  } else if (inPhase(elapsed, PHASES.probe) || inPhase(elapsed, PHASES.perturb1) || inPhase(elapsed, PHASES.perturb2)) {
    ctx.fillStyle = 'rgba(255, 235, 74, 0.5)';
    ctx.fillText('perturbation driven through the system', CX, H * 0.97);
  } else if (elapsed < PHASES.tend.end && elapsed > PHASES.perturb1.start) {
    ctx.fillStyle = 'rgba(255, 90, 74, 0.5)';
    ctx.fillText('hidden coupling revealed', CX, H * 0.97);
  } else if (elapsed > PHASES.tend.start) {
    const tp = pp(elapsed, PHASES.tend);
    ctx.fillStyle = `rgba(74, 232, 160, ${0.5 * ease.outCubic(tp)})`;
    ctx.fillText('system attuned', CX, H * 0.97);
  }

  if (elapsed > PHASES.hold.start) {
    const p = pp(elapsed, PHASES.hold);
    ctx.fillStyle = `rgba(255, 255, 255, ${ease.outCubic(p) * 0.85})`;
    ctx.font = 'bold 20px -apple-system, Helvetica, sans-serif';
    ctx.fillText('Discover. Tend.', CX, CY);
  }
}

function drawVignette() {
  const g = ctx.createRadialGradient(CX, CY, W * 0.2, CX, CY, W * 0.7);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function animate(now) {
  requestAnimationFrame(animate);
  const elapsed = getElapsed(now);
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  let chaos = 1.0;
  if (elapsed > PHASES.tend.start) {
    chaos = 1.0 - ease.inOutCubic(pp(elapsed, PHASES.tend));
  }

  // Spawn perturbations
  if (elapsed >= PHASES.perturb1.start && !perturb1Spawned) {
    spawnPerturbation(0, 7);
    perturb1Spawned = true;
  }
  if (elapsed >= PHASES.perturb2.start && !perturb2Spawned) {
    spawnPerturbation(5, 11);
    perturb2Spawned = true;
  }

  updatePerturbations(dt);

  ctx.fillStyle = '#08080f';
  ctx.fillRect(0, 0, W, H);

  drawBackground();
  drawDocEdges(now / 1000, chaos, elapsed);
  drawPerturbations(now / 1000, chaos);
  drawHiddenEdges(now / 1000, chaos, elapsed);
  drawNodes(now / 1000, chaos, elapsed);
  drawBreeders(now / 1000, chaos, elapsed);
  drawVignette();
  drawText(elapsed);

  if (elapsed > TOTAL) {
    if (elapsed > TOTAL + 2) { restart(); return; }
    const fp = (elapsed - TOTAL) / 2;
    ctx.fillStyle = `rgba(8, 8, 15, ${ease.inOutQuad(fp)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function restart() {
  startTime = null;
  perturbations = [];
  perturb1Spawned = false;
  perturb2Spawned = false;
}

replayBtn.addEventListener('click', restart);
requestAnimationFrame(animate);
</script>
</body>
</html>
